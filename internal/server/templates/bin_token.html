{{define "title"}}Access Token Required — Glimmer{{end}}
{{define "content"}}
<div style="max-width: 480px; margin: 4rem auto 0;">

    <div class="card" style="text-align: center; padding: 2.5rem 2rem;">
        <div style="font-size: 3.5rem; line-height: 1; margin-bottom: 0.5rem;">🔒</div>
        <h2 style="font-size: 1.5rem;">Access Token Required</h2>
        <p class="text-muted" style="margin-bottom: 1.5rem;">This paste is protected. Enter the access token to view it.</p>

        {{if .Error}}
        <div class="alert alert-error" style="text-align: left;">{{.Error}}</div>
        {{end}}

        <form id="token-form" style="text-align: left;">
            <div class="form-group">
                <label for="token-input" class="form-label">Token</label>
                <input type="text" id="token-input" placeholder="Enter access token" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">View Paste</button>
        </form>
    </div>

</div>

<script src="/static/js/bin_token.js"></script>
{{end}}
