# Glimmer Configuration (example)
#
# Copy this file to config.toml and fill in your real values. config.toml is
# gitignored so secrets never get committed. Every field below has a safe
# default in config.Load() EXCEPT admin.password_hash, which is required.

[server]
port = 8888
base_url = "http://localhost:8888"
read_timeout = "5s"
write_timeout = "10s"
# Only enable if behind a trusted reverse proxy that sets X-Forwarded-For.
# When false, the real connection IP is used for rate limiting (cannot be spoofed).
trust_proxy = false
# Maximum number of in-flight HTTP requests before returning 503. Tune down on
# very small hardware (e.g. RPi Zero) to bound memory/CPU use.
max_concurrent = 64

[admin]
username = "admin"
# REQUIRED — the server refuses to start without this.
# Generate a hash: ./glimmer --hash-password "your-password"
password_hash = ""
session_hours = 24

[mcp]
enabled = false
api_key = ""

[database]
path = "./data/urls.db"

[slugs]
length = 7

[upload]
dir = "./data/uploads"
max_size_mb = 50
